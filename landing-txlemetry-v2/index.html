<!-- Supabase client + config: loaded lazily only on auth routes (/signin, /signup, /reset-password, /demo).
     Config is baked in (anon key is public by design — it ships in every browser
     request). If the constants are ever emptied, the bootstrap falls back to
     GET /api/public/config so a backend can supply them instead. -->
<script>
  (function lazySupabaseBootstrap() {
    // Txlemetry Supabase project (eu-west-3).
    var TXL_SUPABASE = {
      supabaseUrl: 'https://cxtcoqbxswftlmsolwmw.supabase.co',
      supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4dGNvcWJ4c3dmdGxtc29sd213Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NjE4OTEsImV4cCI6MjA5ODUzNzg5MX0.j0SH3fGTzfYTfD7zckJQRoyC0IucpvmBm2uD5j_giPg'
    };

    var AUTH_PATHS = ['/signin', '/signup', '/reset-password', '/demo'];
    function shouldEagerLoad() {
      var p = (window.location.pathname || '/').replace(/^\/v2(\/|$)/, '/').replace(/\/+$/, '') || '/';
      return AUTH_PATHS.indexOf(p) !== -1;
    }
    function initClient(cfg) {
      if (!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
        window.__SUPABASE_CONFIG__ = null;
        window.__supabase = null;
        return;
      }
      window.__SUPABASE_CONFIG__ = cfg;
      try {
        window.__supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
          auth: { persistSession: true, autoRefreshToken: true }
        });
      } catch (e) {
        console.error('[Txlemetry] Supabase init failed', e);
        window.__supabase = null;
      }
    }
    function announceReady() {
      window.__supabaseReady = true;
      window.dispatchEvent(new Event('supabase-ready'));
    }
    window.__loadSupabase = function () {
      if (window.__supabaseReady !== undefined) return;       // already started
      window.__supabaseReady = false;
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
      s.async = true;
      s.onload = function () {
        if (TXL_SUPABASE.supabaseUrl && TXL_SUPABASE.supabaseAnonKey) {
          initClient(TXL_SUPABASE);
          announceReady();
          return;
        }
        // Fallback: a backend (if present) can serve the config instead.
        fetch('/api/public/config', { credentials: 'omit' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(initClient)
          .catch(function () { window.__supabase = null; })
          .finally(announceReady);
      };
      s.onerror = function () {
        window.__supabase = null;
        announceReady();
      };
      document.head.appendChild(s);
    };
    if (shouldEagerLoad()) window.__loadSupabase();
  })();
</script>
